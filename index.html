<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#131B2E">
<title>Carnet Libanais — Apprendre le libanais</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌲</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-emblem" aria-hidden="true">𐤟</span>
      <div class="brand-text">
        <h1>Carnet Libanais</h1>
        <p class="tagline">Ton carnet de voyage vers le libanais</p>
      </div>
    </div>
    <button id="shuffleBtn" class="icon-btn" title="Mélanger les cartes" aria-label="Mélanger">⟲</button>
  </header>

  <main class="stage">

    <div class="section-heading">
      <h2 id="sectionTitle">Vocabulaire</h2>
      <span id="counter" class="counter">1 / 1</span>
    </div>

    <div id="cardZone" class="card-zone">
      <!-- La carte est injectée en JS -->
    </div>

    <div class="controls">
      <div id="writeZone" class="write-zone">
        <label for="answerInput" class="write-label">Écris ta réponse en libanais</label>
        <input type="text" id="answerInput" class="answer-input" placeholder="ex. safineh" autocomplete="off" autocapitalize="off" spellcheck="false">
      </div>

      <div class="buttons-row">
        <button id="revealBtn" class="btn btn-primary">Voir la réponse</button>
        <button id="skipBtn" class="btn btn-ghost">Passer →</button>
      </div>
    </div>

  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-section="vocabulaire">
      <span class="nav-icon">🗺️</span><span>Mots</span>
    </button>
    <button class="nav-btn" data-section="phrases">
      <span class="nav-icon">💬</span><span>Phrases</span>
    </button>
    <button class="nav-btn" data-section="verbes">
      <span class="nav-icon">⚙️</span><span>Verbes</span>
    </button>
    <button class="nav-btn" data-section="chiffres">
      <span class="nav-icon">🔢</span><span>Chiffres</span>
    </button>
    <button class="nav-btn" data-section="grammaire">
      <span class="nav-icon">📜</span><span>Grammaire</span>
    </button>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
